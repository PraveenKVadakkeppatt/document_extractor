services:

    redis:
        image: redis:latest
        restart: unless-stopped
        ports:
          - "6379:6379"

    api:
      build: .
      container_name: fastapi

      ports:
        - "8000:8000"

      env_file:
        - .env

      environment:
            - REDIS_HOST=redis
            - DB_SERVER=host.docker.internal

      depends_on:
        - redis

      restart: unless-stopped

    worker: 
        build: .

        command: uv run python -m app.worker.worker

        env_file:
          - .env

        environment:
            - REDIS_HOST=redis
            - DB_SERVER=host.docker.internal

        depends_on:
            - redis